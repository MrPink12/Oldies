# project.yml — XcodeGen configuration for Oldies
# Run `xcodegen generate` from this directory to (re)generate Oldies.xcodeproj.
# All source files live under Sources/Oldies/; the legacy Oldies/Oldies/ folder is ignored.

name: Oldies
options:
  bundleIdPrefix: com.hagstrom
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: Oldies
    PRODUCT_BUNDLE_IDENTIFIER: com.hagstrom.oldies
    DEVELOPMENT_TEAM: WU26G28D5P
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_BITCODE: NO
    # Code-sign settings — Xcode will manage automatically
    CODE_SIGN_STYLE: Automatic

targets:
  Oldies:
    type: application
    platform: iOS

    sources:
      - path: Sources/Oldies
        excludes:
          - "**/.DS_Store"

    resources:
      - Sources/Oldies/Resources/Assets.xcassets

    # info.path intentionally omitted — we manage Info.plist manually
    # so XcodeGen never regenerates or overwrites it.

    # entitlements.properties causes XcodeGen to write the file with correct content
    entitlements:
      path: Sources/Oldies/Resources/Oldies.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:hagstroem.net

    dependencies:
      # Meta Wearables Device Access Toolkit
      - package: MWDATCore
      - package: MWDATCamera

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hagstrom.oldies
        DEVELOPMENT_TEAM: WU26G28D5P
        CODE_SIGN_ENTITLEMENTS: Sources/Oldies/Resources/Oldies.entitlements
        INFOPLIST_FILE: Sources/Oldies/Resources/Info.plist

packages:
  MWDATCore:
    url: https://github.com/facebook/meta-wearables-dat-ios
    from: "1.0.0"
    product: MWDATCore
  MWDATCamera:
    url: https://github.com/facebook/meta-wearables-dat-ios
    from: "1.0.0"
    product: MWDATCamera
